# =====================================================
# ImmortalWrt 24.10 X86/64 自动编译
# By Russell Lee
# =====================================================
name: Build ImmortalWrt X86/64

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload to GitHub Releases'
        required: true
        default: 'true'
        type: boolean
  schedule:
    # 每周日 2:00 UTC 自动编译
    - cron: '0 2 * * 0'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config
  FEEDS_CONF: feeds.conf.default
  AUTHOR: Russell Lee

jobs:
  build:
    runs-on: Ubuntu 24.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev \
          libssl-dev python3-distutils python3-setuptools python3-dev \
          rsync swig unzip zlib1g-dev file wget make awk curl ccache
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone ImmortalWrt Source
      run: |
        git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} immortalwrt
        cd immortalwrt
        
        # 配置国内镜像源
        cat > feeds.conf.default << 'EOF'
        src-git packages https://mirrors.tuna.tsinghua.edu.cn/git/immortalwrt/packages.git;openwrt-24.10
        src-git luci https://mirrors.tuna.tsinghua.edu.cn/git/immortalwrt/luci.git;openwrt-24.10
        src-git routing https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/packages/routing.git;openwrt-24.10
        src-git telephony https://mirrors.tuna.tsinghua.edu.cn/git/openwrt/packages/telephony.git;openwrt-24.10
        EOF

    - name: Load Configuration
      run: |
        cd immortalwrt
        # 复制配置文件
        cp -f ${{ github.workspace }}/${{ env.CONFIG_FILE }} .config
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 应用配置
        make defconfig

    - name: Download Sources
      run: |
        cd immortalwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      run: |
        cd immortalwrt
        make -j$(nproc) V=s 2>&1 | tee build.log
        
    - name: Check Build Result
      run: |
        cd immortalwrt/bin/targets/x86/64/
        ls -la
        echo "=== Firmware Files ==="
        sha256sum *.img.gz *.vmdk.vdi 2>/dev/null || true

    - name: Upload Firmware (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-X86-64-${{ env.AUTHOR }}
        path: immortalwrt/bin/targets/x86/64/
        if-no-files-found: error

    - name: Upload to Releases
      if: github.event.inputs.upload_release == 'true' || github.event_name == 'schedule'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ImmortalWrt-X86-64-${{ github.run_number }}
        name: ImmortalWrt 24.10 X86/64 - ${{ github.run_number }}
        body: |
          ## ImmortalWrt 24.10 X86/64 固件
          
          **编译者:** ${{ env.AUTHOR }}  
          **编译时间:** ${{ github.event.head_commit.timestamp || github.event.schedule }}  
          **源码分支:** ${{ env.REPO_BRANCH }}  
          **Actions 运行:** [查看日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          
          ### 📦 已包含插件
          - **主题:** luci-theme-argon + luci-app-argon-config
          - **代理:** luci-app-homeproxy
          - **DNS:** luci-app-smartdns + luci-app-nextdns
          - **下载:** luci-app-qbittorrent + luci-app-filebrowser
          - **穿透:** luci-app-frpc + luci-app-frps
          - **网络:** luci-app-upnp
          - **系统:** luci-app-cpufreq + luci-app-ttyd + luci-app-samba4 + luci-app-diskman
          - **安全:** luci-app-banip
          - **监控:** luci-app-nlbwmon + luci-app-statistics
          
          ---
          
          ### 📝 使用说明
          1. 下载 `*.img.gz` 文件并解压
          2. 使用 Rufus/Etcher 写入 U 盘或硬盘
          3. 启动后访问 `192.168.1.1`
          4. 默认密码：`password`（首次登录需修改）
          
          ### ⚠️ 注意事项
          - 首次使用建议格式化硬盘
          - 生产环境使用前请测试稳定性
        files: |
          immortalwrt/bin/targets/x86/64/*.img.gz
          immortalwrt/bin/targets/x86/64/*.vmdk
          immortalwrt/bin/targets/x86/64/*.vdi
          immortalwrt/bin/targets/x86/64/*.iso
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete Old Releases (Keep Latest 5)
      if: github.event.inputs.upload_release == 'true' || github.event_name == 'schedule'
      uses: dev-drprasad/delete-older-releases@v0.2.1
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Send Notification (Optional)
      if: always()
      run: |
        echo "Build completed with status: ${{ job.status }}"
